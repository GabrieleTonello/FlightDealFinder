plugins {
    id 'java-library'
    id 'jacoco'
    id 'checkstyle'
    id 'com.diffplug.spotless' version '7.0.2'
    id 'software.amazon.smithy.gradle.smithy-base' version '1.4.0'
}

group = 'com.flightdeal'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenLocal()
    mavenCentral()
}

def awsSdkVersion = '2.31.1'
def smithyVersion = '1.68.0'
def jacksonVersion = '2.18.3'

dependencies {
    // Smithy code generation plugin (build-time)
    smithyBuild 'software.amazon.smithy.java:client-codegen:0.0.3'

    // Smithy Java runtime (required by generated code)
    implementation 'software.amazon.smithy.java:client-core:0.0.3'

    // Smithy model dependency
    implementation "software.amazon.smithy:smithy-model:${smithyVersion}"

    // AWS SDK v2 BOM for dependency management
    implementation platform("software.amazon.awssdk:bom:${awsSdkVersion}")

    // AWS SDK v2 service clients
    implementation 'software.amazon.awssdk:lambda'
    implementation 'software.amazon.awssdk:dynamodb'
    implementation 'software.amazon.awssdk:dynamodb-enhanced'
    implementation 'software.amazon.awssdk:sns'
    implementation 'software.amazon.awssdk:sqs'
    implementation 'software.amazon.awssdk:sfn'
    implementation 'software.amazon.awssdk:cloudwatch'
    implementation 'software.amazon.awssdk:ses'

    // AWS Lambda Java runtime
    implementation 'com.amazonaws:aws-lambda-java-core:1.2.3'
    implementation 'com.amazonaws:aws-lambda-java-events:3.14.0'

    // Google Guice dependency injection
    implementation 'com.google.inject:guice:7.0.0'

    // SLF4J + Lambda Log4j2 for CloudWatch logging
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'com.amazonaws:aws-lambda-java-log4j2:1.6.0'
    implementation 'org.apache.logging.log4j:log4j-slf4j2-impl:2.24.3'
    implementation 'org.apache.logging.log4j:log4j-core:2.24.3'

    // Jackson JSON serialization
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    implementation "com.fasterxml.jackson.core:jackson-core:${jacksonVersion}"
    implementation "com.fasterxml.jackson.core:jackson-annotations:${jacksonVersion}"
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${jacksonVersion}"

    // JUnit 5 test framework
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // jqwik property-based testing
    testImplementation 'net.jqwik:jqwik:1.9.3'

    // Lombok for boilerplate reduction
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'
    testCompileOnly 'org.projectlombok:lombok:1.18.36'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.36'

    // Mockito for test mocking
    testImplementation 'org.mockito:mockito-core:5.15.2'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.15.2'
}

// Add Smithy-generated Java sources to the main source set
afterEvaluate {
    def clientPath = smithy.getPluginProjectionPath(smithy.sourceProjection.get(), 'java-client-codegen')
    sourceSets {
        main {
            java {
                srcDir clientPath
            }
        }
    }
}

// Ensure Smithy code generation runs before Java compilation
tasks.named('compileJava') {
    dependsOn 'smithyBuild'
}

// Configure Smithy model source directory
smithy {
    smithyBuildConfigs.set(project.files("smithy-build.json"))
}

test {
    useJUnitPlatform()

    // Enable jqwik test engine
    jvmArgs '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED'

    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}

// JaCoCo code coverage configuration
jacoco {
    toolVersion = '0.8.12'
}

def jacocoExcludes = [
    'com/flightdeal/guice/**',
    'com/flightdeal/generated/**',
    '**/lombok/**'
]

jacocoTestReport {
    dependsOn test

    reports {
        html.required = true
        xml.required = true
    }

    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, excludes: jacocoExcludes)
        }))
    }
}

jacocoTestCoverageVerification {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, excludes: jacocoExcludes)
        }))
    }

    violationRules {
        rule {
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.8
            }
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.8
            }
        }
    }
}

test.finalizedBy jacocoTestReport
check.dependsOn jacocoTestCoverageVerification

// Spotless code formatting — google-java-format
spotless {
    java {
        target 'src/**/*.java'
        googleJavaFormat('1.25.2')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

// Run spotless check as part of the build
check.dependsOn 'spotlessCheck'

// Checkstyle static analysis
checkstyle {
    toolVersion = '10.21.4'
    configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
    maxWarnings = 0
}

// Exclude Smithy-generated code from Checkstyle
tasks.withType(Checkstyle).configureEach {
    exclude '**/generated/**'
}
